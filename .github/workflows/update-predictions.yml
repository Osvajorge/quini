name: Update predictions

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes (smart exit skips when no matches near)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install numpy scipy pandas requests python-dotenv

      - name: Generate predictions
        env:
          THE_ODDS_API_KEY_FREE: ${{ secrets.THE_ODDS_API_KEY_FREE }}
        run: python api/generate.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/predictions.json docs/data/history.json
          git diff --cached --quiet || git commit -m "data: update predictions $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
