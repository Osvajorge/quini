name: Update predictions

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 min; smart exit + rate limiting handles API credits
  workflow_dispatch:

concurrency:
  group: update-predictions
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update results and refit model if new scores
        run: python scripts/update_and_refit.py

      - name: Generate predictions
        env:
          THE_ODDS_API_KEY_FREE: ${{ secrets.THE_ODDS_API_KEY_FREE }}
        run: python api/generate.py

      - name: Fetch live xG from api-football (best-effort)
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python -m tools.fetch_live_xg || true

      - name: Fetch confirmed lineups (best-effort, 24h window)
        run: python -m tools.fetch_lineups || true

      - name: Auto-post Twitter (best-effort, skips if no creds)
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
        run: python -m tools.post_twitter || true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/predictions.json docs/data/history.json docs/data/odds_history.json docs/data/social_posts.json docs/data/projections.json docs/data/match_stats.json docs/data/player_stats.json docs/data/statsbomb_wc2022_players.json docs/data/statsbomb_wc2022_teams.json docs/data/wikipedia_wc2026.json docs/data/fbref_teams.json docs/og-card.png docs/index.html data/fit.pkl data/refit_state.json docs/data/lineups.json
          [ -f .posted_tweets.json ] && git add .posted_tweets.json || true
          git rm -f docs/data/sofascore.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "data: update predictions $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

      - name: Send picks email to waitlist (best-effort, once per day)
        if: env.PICKS_SECRET != ''
        env:
          PICKS_SECRET: ${{ secrets.PICKS_SECRET }}
        run: |
          curl -s -o /tmp/picks_resp.json -w "%{http_code}" \
            -X POST https://kini.bet/api/send-picks \
            -H "Authorization: Bearer $PICKS_SECRET" \
            -H "Content-Type: application/json" \
            && echo "" && cat /tmp/picks_resp.json || true
